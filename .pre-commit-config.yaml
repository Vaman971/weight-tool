repos:
  # ── Code formatting ──────────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3
        args: ["--line-length=100"]

  # ── Import sorting ───────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=100"]

  # ── Linting ──────────────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        args:
          - "--max-line-length=100"
          - "--extend-ignore=E203,W503"   # black-compatible
          - "--per-file-ignores=tests/*:S101"  # allow assert in tests
        additional_dependencies:
          - flake8-bugbear
          - flake8-comprehensions
          - flake8-simplify

  # ── Static type checking ─────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports", "--strict"]
        files: ^src/
        additional_dependencies:
          - numpy
          - pandas-stubs
          - types-openpyxl

  # ── Security scanning ────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-r", "src/", "-ll"]  # report issues at LOW severity and above
        exclude: ^tests/
        pass_filenames: false

  # ── General file hygiene ─────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: debug-statements        # catches leftover print / pdb / breakpoint
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-docstring-first

  # ── Docstring enforcement ────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: ["--convention=numpy"]
        exclude: ^tests/
        additional_dependencies:
          - tomli

  # ── Upgrade syntax to target Python version ──────────────────────────────
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.16.0
    hooks:
      - id: pyupgrade
        args: ["--py310-plus"]

default_language_version:
  python: python3.10

ci:
  autoupdate_schedule: monthly
